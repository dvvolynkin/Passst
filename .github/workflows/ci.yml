name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Show Swift toolchain
        run: swift --version

      - name: Build release configuration
        run: swift build -c release

      - name: Run unit tests
        run: swift test

  package:
    runs-on: macos-26
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Build Universal 2 release
        run: scripts/package-app.sh release 0.2.1 7

      - name: Verify release artifacts
        run: |
          lipo dist/Passst.app/Contents/MacOS/Passst -verify_arch arm64 x86_64
          codesign --verify --deep --strict --verbose=2 dist/Passst.app
          (cd dist && shasum -a 256 -c Passst-0.2.1-SHA256SUMS.txt)
