<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="background" x1="112" y1="88" x2="912" y2="944" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171B35"/>
      <stop offset="0.52" stop-color="#28245B"/>
      <stop offset="1" stop-color="#111426"/>
    </linearGradient>
    <linearGradient id="backCard" x1="206" y1="324" x2="630" y2="812" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6BB7"/>
      <stop offset="1" stop-color="#9457FF"/>
    </linearGradient>
    <linearGradient id="middleCard" x1="300" y1="246" x2="730" y2="746" gradientUnits="userSpaceOnUse">
      <stop stop-color="#55E6FF"/>
      <stop offset="1" stop-color="#3A72FF"/>
    </linearGradient>
    <linearGradient id="frontCard" x1="408" y1="178" x2="808" y2="704" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9ECFF"/>
