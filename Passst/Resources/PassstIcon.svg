  <rect x="49" y="49" width="926" height="926" rx="207" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="4"/>

  <g filter="url(#cardShadow)">
    <rect x="178" y="332" width="440" height="476" rx="108" fill="url(#backCard)"/>
    <rect x="286" y="252" width="440" height="476" rx="108" fill="url(#middleCard)"/>
    <rect x="394" y="172" width="440" height="476" rx="108" fill="url(#frontCard)"/>
