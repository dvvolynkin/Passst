name: Passst

options:
  bundleIdPrefix: app.passst
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.0.0
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    exactVersion: 1.12.0

targets:
  Passst:
    type: application
    platform: macOS
    sources:
      - path: Passst
        excludes:
          - Info.plist
          - Passst.entitlements
    resources:
      - path: Passst/Resources
    dependencies:
      - package: GRDB
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.passst.mac
        PRODUCT_NAME: Passst
        MARKETING_VERSION: 0.1.2
        CURRENT_PROJECT_VERSION: 3
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: 14.0
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Passst/Info.plist
        CODE_SIGN_ENTITLEMENTS: Passst/Passst.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PassstTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PassstTests
    dependencies:
      - target: Passst
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.passst.mac.tests
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: 14.0

  PassstUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: PassstUITests
    dependencies:
      - target: Passst
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.passst.mac.uitests
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: 14.0
        TEST_TARGET_NAME: Passst

schemes:
  Passst:
    build:
      targets:
        Passst: all
        PassstTests: [test]
    test:
      targets:
        - PassstTests
        - PassstUITests
